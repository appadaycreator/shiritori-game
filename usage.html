<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>使い方 - しりとりゲーム</title><style>body{font-family:'Noto Sans JP',sans-serif;background:#0a0a1a;color:#e0e0ff;max-width:800px;margin:0 auto;padding:2rem 1rem;line-height:1.8}h1,h2{color:#80cbc4}ol{padding-left:1.5rem}li{margin-bottom:0.5rem}a{color:#80cbc4}</style></head><body><h1>使い方</h1><h2>遊び方</h2><ol><li>難易度を選択（かんたん・ふつう・むずかしい）</li><li>「ゲームスタート！」をクリック</li><li>CPUが最初の言葉を言うので、その最後の文字から始まる言葉を入力</li><li>「送る」ボタンまたはEnterキーで送信</li><li>「ん」で終わる言葉を言ったら負け！</li></ol><h2>ルール</h2><p>ひらがなで入力・「ん」で終わったら負け・使用済み単語は使えません。制限時間（ふつう30秒・むずかしい15秒）があります。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
